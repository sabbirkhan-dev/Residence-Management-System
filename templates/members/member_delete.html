{% extends "base.html" %}
{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            
            <div class="card shadow-sm mt-5">
                <div class="card-header bg-danger text-white py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-trash3 me-2"></i>Delete Member
                    </h4>
                </div>
                
                <div class="card-body text-center py-5">
                    <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-4"></i>
                    
                    <h5 class="mb-3">Are you sure?</h5>
                    <p class="text-muted mb-4">
                        You are about to delete <strong>"{{ member.name }}"</strong>.<br>
                        This action cannot be undone.
                    </p>
                    
                    <form method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4 me-3">
                            <i class="bi bi-trash me-1"></i> Yes, Delete
                        </button>
                    </form>
                    
                    <a href="{% url 'member_list' %}" 
                       class="btn btn-secondary px-4">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
