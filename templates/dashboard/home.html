{% extends "base.html" %}
{% block content %}

<div class="container">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0 fw-semibold text-dark">
            <i class="bi bi-speedometer2 me-2 text-success"></i>Dashboard Overview
        </h3>
        <small class="text-muted">{{ today|date:"d F, Y" }}</small>
    </div>

    <div class="row g-4">
        <!-- Total Members -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="text-muted mb-2">Total Members</h6>
                            <h2 class="fw-bold text-dark mb-0">{{ total_members }}</h2>
                        </div>
                        <i class="bi bi-people-fill fs-1 text-primary opacity-75"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Today's Breakfast -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="text-muted mb-2">Today's Breakfast</h6>
                            <h2 class="fw-bold text-success mb-0">{{ breakfast_count }}</h2>
                        </div>
                        <i class="bi bi-egg-fried fs-1 text-warning opacity-75"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Today's Dinner -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="text-muted mb-2">Today's Dinner</h6>
                            <h2 class="fw-bold text-danger mb-0">{{ dinner_count }}</h2>
                        </div>
                        <i class="bi bi-moon-stars fs-1 text-info opacity-75"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
